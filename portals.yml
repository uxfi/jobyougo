    - Product Designer
    - UX Designer
    - UI Designer
    - UX/UI
    - UI/UX
    - UX Lead
    - UI Lead
    - Design Lead
    - Head of Design
    - Head of Product
  negative:
    - Junior
    - Intern
    - Hybrid
    - On-site
    - Onsite
    - Relocation
    - .NET
    - "Java "
    - iOS
    - Android
    - PHP
    - Ruby
    - Embedded
    - Firmware
    - FPGA
    - ASIC
    - Blockchain
    - Web3
    - Crypto
    - Salesforce Admin
    - "SAP "
    - Oracle EBS
    - Mainframe
    - COBOL
    - Data Scientist
    - ML Engineer
    - MLOps
    - Austin, TX
    - San Francisco
    - New York, NY
    - Seattle, WA
    - Boston, MA
    - Chicago, IL
    - Los Angeles
    - Toronto
    - Vancouver
    - Canada
  seniority_boost:
    - Senior
    - Staff
    - Lead
    - Head
    - Director
    - Principal
remote_filter:
  mode: strict_full_remote_only
  required_any:
    - remote
    - full remote
    - fully remote
    - remote-first
    - work from anywhere
    - distributed
  rejected_any:
    - hybrid
    - on-site
    - onsite
    - in office
    - office-based
    - relocation
    - must be located
    - commutable
  ambiguous_policy: skip
