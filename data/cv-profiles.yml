ai_builder:
  headline: "AI Product Builder, Founder & Senior Product Designer"
  portrait: "hugo_vermot.png"
  summary: |
    French AI product builder and senior product designer based in Paris & Bangkok. UX designer since 2015, with a trajectory spanning enterprise design, 9 years of freelance work, startup co-founding, agency leadership, and solo AI SaaS building.

    I operate at the intersection of Product Design, Agentic AI, multi-modal pipelines, prompt systems, and growth automation. My edge is simple: I can design the UX, architect the AI system, and ship the product. I think in systems: information architecture, scalable foundations, regulated flows, and reproducible AI outputs.

    Direct enterprise experience includes LVMH, Renault Group, BMW Group, Société Générale, Shiseido Group, SNCF, Edenred, Casino/Spar/Vival, GALIAN-SMABTP, Marcel/Publicis, and France Télévisions.
